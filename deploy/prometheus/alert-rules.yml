groups:
  - name: codeinsight-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate (> 5%)"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighResponseLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response latency (P95 > 5s)"
          description: "P95 latency is {{ $value }}s for {{ $labels.uri }}."

      - alert: AIModelCallSlow
        expr: histogram_quantile(0.95, rate(codeinsight_model_call_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI model call latency high (P95 > 30s)"
          description: "Model {{ $labels.model }} P95 latency is {{ $value }}s."

      - alert: IndexingTaskStuck
        expr: codeinsight_indexing_active > 0 and changes(codeinsight_indexing_active[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Indexing task appears stuck"
          description: "Active indexing count has not changed in 30 minutes."

      - alert: JVMHeapPressure
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage above 85%"
          description: "Heap usage is {{ $value | humanizePercentage }}."

      - alert: JVMHeapCritical
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "JVM heap usage critical (> 95%)"
          description: "Heap usage is {{ $value | humanizePercentage }}. OOM risk."

      - alert: DatabaseConnectionPoolExhausted
        expr: hikaricp_connections_pending > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted"
          description: "{{ $value }} connections pending in HikariCP pool."

      - alert: ServiceDown
        expr: up{job="codeinsight-agent"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CodeInsight service is down"
          description: "The application is unreachable by Prometheus."
