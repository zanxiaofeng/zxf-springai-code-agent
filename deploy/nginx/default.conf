upstream backend {
    server app:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 500m;

    # API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Actuator (restrict in production)
    location /actuator/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://backend;
    }

    location /v3/api-docs {
        proxy_pass http://backend;
    }

    # Frontend static files — served from container or build output
    # In production, mount the built dist/ here:
    #   volumes:
    #     - ../../codeinsight-ui/dist:/usr/share/nginx/html:ro
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
